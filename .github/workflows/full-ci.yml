name: Full CI

on:
  # Tymczasowo wyłączamy automatyczne wyzwalanie – workflow można uruchomić ręcznie,
  # gdy zestaw testów będzie znów stabilny (CI psuło się na push/pr).
  workflow_dispatch:

jobs:
  backend:
    name: Backend (pytest + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate coding-agent context brief artifact
        run: |
          python3 scripts/generate_agent_context_brief.py
      - name: Upload coding-agent context brief
        uses: actions/upload-artifact@v6
        with:
          name: coding-agent-context-brief
          path: test-results/agent-context/**
          if-no-files-found: error
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-full.txt
      - name: Lint (pre-commit)
        run: |
          pip install pre-commit
          pre-commit run --all-files
      - name: Pytest (smoke)
        run: pytest -q

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: web-next/package-lock.json
      - name: Install dependencies
        run: npm --prefix web-next ci
      - name: Lint
        run: npm --prefix web-next run lint
      - name: Build
        run: npm --prefix web-next run build
